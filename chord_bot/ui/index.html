<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chord Bot</title>
<style>
:root {
  --bg:       #0d0d14;
  --surface:  #161622;
  --surface2: #1e1e2e;
  --border:   #2a2a40;
  --text:     #dde0f0;
  --dim:      #6060a0;
  --accent:   #9b59b6;
  --accent2:  #e67e22;
  --tonic:    #27ae60;
  --sub:      #3498db;
  --dom:      #e74c3c;
  --pre:      #f39c12;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:12px;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}

/* ── Header ── */
#hdr{display:flex;align-items:center;gap:8px;padding:0 12px;height:40px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#hdr h1{font-size:13px;font-weight:700;color:var(--accent);margin-right:4px;white-space:nowrap}
.btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font:inherit;font-size:11px;transition:background .12s}
.btn:hover{background:var(--border)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{opacity:.85}
.btn.play{background:#1d3a1d;border-color:var(--tonic);color:var(--tonic)}
.btn.play.active{background:var(--tonic);color:#000}
.bpm-wrap{display:flex;align-items:center;gap:4px;color:var(--dim)}
.bpm-wrap input{width:48px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font:inherit;text-align:center}
#fnBadge{padding:3px 7px;border-radius:3px;font-weight:700;font-size:11px;background:var(--surface2);border:1px solid var(--border);min-width:30px;text-align:center;transition:background .2s}
#statusBar{margin-left:auto;color:var(--dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
#hdrRight{display:flex;gap:6px;margin-left:4px}
#pipelineLink{color:var(--sub);font-size:10px;text-decoration:none;padding:2px 6px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
#pipelineLink:hover{background:var(--surface2)}

/* ── Timeline strip ── */
#nodeRail{
  display:flex;align-items:center;
  overflow-x:auto;overflow-y:hidden;
  padding:14px 20px;gap:3px;
  height:100px;flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#nodeRail::-webkit-scrollbar{height:4px}
#nodeRail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#railEmpty{
  display:flex;align-items:center;gap:10px;color:var(--dim);
  font-size:11px;opacity:.45;pointer-events:none;white-space:nowrap;
}

/* ── Node blocks ── */
.nc{
  flex-shrink:0;height:72px;min-width:88px;
  border-radius:6px;
  border:1.5px solid var(--border);
  border-left:3px solid var(--accent2);
  background:#14100a;
  padding:7px 10px 5px;
  cursor:pointer;position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:border-color .12s,box-shadow .12s;
}
.nc:hover{border-color:rgba(230,126,34,.5)}
.nc.nc-sel{border-color:var(--accent);border-left-color:var(--accent);box-shadow:0 0 0 2px rgba(155,89,182,.22)}
.nc.nc-play{border-left-color:var(--tonic);box-shadow:0 0 10px rgba(39,174,96,.28)}
.nc.nc-sub{border-left-color:#1abc9c}
.nc.drag-ghost{opacity:.3;pointer-events:none}

/* ── Augmenters in drawer ── */
#drawerAugsWrap{
  display:none;flex-direction:column;gap:3px;
  padding:6px 14px 7px;flex-shrink:0;
  border-bottom:1px solid rgba(155,89,182,.15);
}
#drawerAugsWrap.has-content{display:flex}
#drawerAugs{display:flex;flex-direction:column;gap:3px}
.drawer-aug{
  display:flex;align-items:center;gap:6px;
  border:1px solid rgba(155,89,182,.22);border-left:2px solid var(--accent);
  border-radius:4px;padding:4px 10px;cursor:pointer;
  background:rgba(155,89,182,.05);transition:background .1s;
}
.drawer-aug:hover{background:rgba(155,89,182,.12)}
.drawer-aug.active{background:rgba(155,89,182,.16);border-color:var(--accent);box-shadow:inset 0 0 0 1px rgba(155,89,182,.25)}
.drawer-aug-name{font-size:10px;font-weight:700;color:var(--accent)}
.drawer-aug-val{font-size:10px;color:var(--dim);margin-left:2px}
.drawer-aug-del{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 3px;opacity:0;transition:opacity .1s;line-height:1}
.drawer-aug:hover .drawer-aug-del{opacity:1}
.drawer-aug-del:hover{color:#e74c3c}
#drawerAugAdd{font-size:10px;color:var(--dim);border:1px dashed rgba(155,89,182,.3);border-radius:3px;padding:3px 8px;background:none;cursor:pointer;font:inherit;text-align:left;transition:border-color .1s,color .1s;align-self:flex-start;margin-top:1px}
#drawerAugAdd:hover{border-color:var(--accent);color:var(--accent)}

.nc-top{display:flex;align-items:baseline;gap:5px}
.nc-numeral{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.04em;white-space:nowrap}
.nc-type-label{font-size:9px;color:var(--dim);opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.nc-chord{font-size:15px;font-weight:700;line-height:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.nc-bottom{display:flex;align-items:center;gap:4px;min-height:12px}
.nc-aug-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.nc-aug-label{font-size:8px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Delete button (hover reveal) */
.nc-del{
  position:absolute;top:3px;right:3px;
  background:transparent;border:none;
  color:var(--dim);cursor:pointer;
  font-size:12px;line-height:1;padding:1px 3px;
  opacity:0;transition:opacity .12s,color .12s;border-radius:3px;
}
.nc:hover .nc-del{opacity:1}
.nc-del:hover{color:#e74c3c;background:rgba(231,76,60,.12)}
/* ── Resize handle ── */
.nc-resize{
  position:absolute;right:0;top:0;bottom:0;width:7px;
  cursor:col-resize;z-index:3;
  background:transparent;
  transition:background .1s;
}
.nc:hover .nc-resize{background:rgba(155,89,182,.25)}
.nc-resize:hover,.nc-resize.resizing{background:rgba(155,89,182,.55)!important}
/* ── Tension bar ── */
.nc-tension{position:absolute;top:0;left:3px;right:7px;height:3px;border-radius:1px;opacity:.8}

/* ── Insert buttons ── */
.nc-ins{
  flex-shrink:0;
  width:18px;height:44px;
  background:transparent;
  border:1.5px dashed var(--border);
  border-radius:5px;color:var(--dim);
  font-size:14px;cursor:pointer;padding:0;
  line-height:1;font:inherit;
  transition:border-color .12s,color .12s,background .12s;
}
.nc-ins:hover,.nc-ins.drag-over{
  border-color:var(--accent);color:var(--accent);
  background:rgba(155,89,182,.08);
}

/* ── Param Drawer ── */
#paramDrawer{
  flex-shrink:0;overflow:hidden;
  max-height:0;
  transition:max-height .18s ease;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
#paramDrawer.open{max-height:320px}
#paramDrawerInner{
  max-height:320px;display:flex;flex-direction:column;overflow:hidden;
}
#paramDrawerHead{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px 5px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#paramDrawerTitle{font-size:12px;font-weight:700;color:var(--text)}
#paramDrawerSub{font-size:10px;color:var(--dim);margin-left:2px}
#paramDrawerClose{display:none}
#paramScrollArea{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 14px}
.paramRow{margin-bottom:7px;display:flex;align-items:center;gap:8px}
.paramRow label{width:96px;flex-shrink:0;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.paramRow input[type=text],.paramRow input[type=number],.paramRow select{
  flex:1;min-width:0;padding:3px 6px;border:1px solid var(--border);
  border-radius:3px;background:var(--surface2);color:var(--text);font:inherit;font-size:11px;
}
.paramRow input[type=range]{flex:1;accent-color:var(--accent)}
.paramRow input[type=checkbox]{accent-color:var(--accent)}
.paramRow .numdisp{width:52px;flex-shrink:0}
.paramHint{color:var(--dim);font-size:9px;margin-left:104px;margin-top:-4px;margin-bottom:4px}

/* ── Preview ── */
#preview{flex:1;display:flex;flex-direction:column;min-height:80px;border-top:1px solid var(--border)}
#previewResizeHandle{height:5px;cursor:ns-resize;background:var(--surface);border-top:2px solid var(--border);flex-shrink:0;transition:border-color .15s}
#previewResizeHandle:hover,#previewResizeHandle.active{border-top-color:var(--accent)}
#previewTabs{display:flex;gap:2px;padding:4px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:28px;align-items:center}
.tab{padding:2px 10px;border-radius:3px;cursor:pointer;font-size:11px;color:var(--dim);transition:background .1s}
.tab.active{background:var(--surface2);color:var(--text)}
#previewCanvases{flex:1;position:relative;overflow:auto}
#pianoCanvas,#tensionCanvas{display:none}
#pianoCanvas.visible,#tensionCanvas.visible{display:block}
canvas{display:block}

/* ── Node type picker popup ── */
.node-picker{
  position:fixed;z-index:500;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:4px;min-width:150px;max-height:260px;
  overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.7);
}
.picker-item{
  padding:6px 10px;cursor:pointer;border-radius:5px;font-size:11px;
  display:flex;align-items:center;gap:7px;transition:background .1s;
}
.picker-item:hover{background:var(--border)}
.picker-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Mobile ── */
#mobTabs{display:none}
@media(max-width:640px){
  body{font-size:13px}
  #hdr{height:auto;flex-wrap:wrap;padding:6px 8px;gap:6px}
  #statusBar,#fnBadge{display:none}
  .btn{padding:7px 12px;font-size:12px}
  .bpm-wrap input{width:56px;font-size:13px}
  #nodeRail{height:90px;padding:9px 12px}
  .nc{height:68px}
  .nc-chord{font-size:13px}
  #paramDrawer.open{max-height:280px}
  #paramDrawerInner{max-height:280px}
  .paramRow{flex-wrap:wrap}
  .paramRow label{width:auto;min-width:80px}
  #preview{height:200px;min-height:200px;flex:none}
  #mobTabs{display:flex;height:50px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
  #mobTabs button{flex:1;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
  #mobTabs button.active{color:var(--accent)}
  #mobTabs button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
}
</style>
</head>
<body>

<div id="hdr">
  <h1>Chord Bot</h1>
  <button class="btn primary" id="btnExec">Execute</button>
  <button class="btn play" id="btnPlay">▶ Play</button>
  <button class="btn" id="btnLoop" style="font-size:10px;padding:4px 8px" title="Toggle loop mode">↻</button>
  <div class="bpm-wrap"><span>BPM</span><input type="number" id="bpmIn" value="120" min="40" max="300"></div>
  <button class="btn" id="btnAdd">＋ Add</button>
  <div id="hdrRight">
    <button class="btn" id="btnExport">↓ MIDI</button>
    <button class="btn" id="btnSaveJson">↓ JSON</button>
    <button class="btn" id="btnLoadJson">↑ JSON</button>
    <input type="file" id="jsonFileIn" accept=".json" style="display:none">
    <button class="btn" id="btnClear">Clear</button>
    <button class="btn" id="btnDefault">Example</button>
    <a href="/wiki" class="btn" style="text-decoration:none">? Docs</a>
  </div>
  <span id="fnBadge">—</span>
  <span id="statusBar">ready</span>
  <a id="pipelineLink" href="http://127.0.0.1:7860" target="_blank" title="Image Pipeline">🎨 Pipeline</a>
</div>

<div id="nodeRail">
  <div id="railEmpty"><span style="font-size:22px;opacity:.4">♩</span> Press <strong>＋ Add</strong> or click <strong>+</strong> to build a progression</div>
</div>

<div id="paramDrawer" class="open">
  <div id="paramDrawerInner">
    <div id="paramDrawerHead">
      <span id="paramDrawerTitle">—</span>
      <span id="paramDrawerSub"></span>
      <button id="paramDrawerClose">✕</button>
    </div>
    <div id="drawerAugsWrap">
      <div id="drawerAugs"></div>
      <button id="drawerAugAdd">+ augmenter</button>
    </div>
    <div id="paramScrollArea"></div>
  </div>
</div>

<div id="preview">
  <div id="previewResizeHandle"></div>
  <div id="previewTabs">
    <span class="tab active" data-tab="piano">Piano Roll</span>
    <span class="tab" data-tab="tension">Tension</span>
  </div>
  <div id="previewCanvases">
    <canvas id="pianoCanvas" class="visible"></canvas>
    <canvas id="tensionCanvas"></canvas>
  </div>
</div>

<div id="mobTabs">
  <button data-panel="timeline" class="active">
    <svg viewBox="0 0 24 24"><rect x="2" y="9" width="5" height="6" rx="1"/><rect x="9" y="7" width="5" height="10" rx="1"/><rect x="16" y="10" width="5" height="5" rx="1"/></svg>
    Timeline
  </button>
  <button data-panel="params">
    <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Params
  </button>
  <button data-panel="preview">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="1"/><path d="M2 12h20"/></svg>
    Preview
  </button>
  <a href="/wiki" style="flex:1;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent;text-decoration:none">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Docs
  </a>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
