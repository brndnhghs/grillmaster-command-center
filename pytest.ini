# pytest configuration for the Grillmaster image pipeline.
#
# The `slow` marker covers long-running regression guards (e.g. rendering every
# simulation method to confirm it still produces a valid frame). These are
# deliberately EXCLUDED from the default fast suite so `pytest -q` stays within
# the cron time budget; run them explicitly with `-m slow` (or via the
# standalone `scripts/sim_perf_probe.py`, which is the cron-friendly path).
[pytest]
markers =
    slow: long-running render/perf regression guards; run explicitly with -m slow
addopts = -m "not slow"
testpaths = image_pipeline/tests
